services:
  - type: web
    name: legiao-sports-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false          # cole manualmente no painel do Render
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        sync: false          # ex: https://legiao-sports.vercel.app
      - key: ADMIN_PASSWORD
        sync: false          # senha do painel admin
      - key: ADMIN_TOKEN
        generateValue: true  # Render gera automaticamente